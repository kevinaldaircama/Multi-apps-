<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family: 'Poppins', sans-serif;
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
}

/* TARJETA */
.card{
  width:100%;
  max-width:380px;
  background:white;
  border-radius:16px;
  padding:28px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* LOGO */
.logo{
  text-align:center;
  margin-bottom:10px;
}
.logo img{
  width:60px;
}

/* TITULO */
h2{
  text-align:center;
  margin-bottom:20px;
  font-weight:600;
  color:#111827;
}

/* INPUT */
.input{
  margin-bottom:14px;
}

.input input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #e5e7eb;
  outline:none;
  background:#f9fafb;
  transition:0.2s;
}

/* FOCUS LIMPIO */
.input input:focus{
  border-color:#6366f1;
  background:white;
}

/* BOTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#6366f1;
  color:white;
  font-weight:500;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#4f46e5;
}

/* MENSAJE */
#msg{
  margin-top:15px;
  text-align:center;
  font-size:14px;
  color:#374151;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/888/888879.png">
  </div>

  <h2>Crear cuenta</h2>

  <div class="input">
    <input type="text" id="nombre" placeholder="Nombre completo *">
  </div>

  <div class="input">
    <input type="email" id="email" placeholder="Correo electrónico *">
  </div>

  <div class="input">
    <input type="password" id="password" placeholder="Contraseña *">
  </div>

  <div class="input">
    <input type="password" id="confirm" placeholder="Confirmar contraseña *">
  </div>

  <div class="input">
    <input type="text" id="telegram" placeholder="Telegram (opcional)">
  </div>

  <div class="input">
    <input type="text" id="whatsapp" placeholder="WhatsApp (opcional)">
  </div>

  <button onclick="registrar()">Crear cuenta</button>

  <p id="msg"></p>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyBLZdhjEPY3iOuU6F6zlPwub38Qbzny2f8",
    authDomain: "dvmulti-831ba.firebaseapp.com",
    databaseURL: "https://dvmulti-831ba-default-rtdb.firebaseio.com",
    projectId: "dvmulti-831ba",
    storageBucket: "dvmulti-831ba.firebasestorage.app",
    messagingSenderId: "967026058841",
    appId: "1:967026058841:web:02b42def3c608d9abef348",
    measurementId: "G-PE1PLQF2H9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.registrar = async function(){

  let nombre = document.getElementById("nombre").value;
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;
  let confirm = document.getElementById("confirm").value;
  let telegram = document.getElementById("telegram").value;
  let whatsapp = document.getElementById("whatsapp").value;
  let msg = document.getElementById("msg");

  if(!nombre || !email || !pass || !confirm){
    msg.innerText = "Completa los campos";
    return;
  }

  if(pass !== confirm){
    msg.innerText = "Las contraseñas no coinciden";
    return;
  }

  try{
    let userCred = await createUserWithEmailAndPassword(auth, email, pass);
    await sendEmailVerification(userCred.user);

    await setDoc(doc(db, "usuarios", userCred.user.uid), {
      nombre,email,telegram,whatsapp
    });

    msg.innerText = "Cuenta creada ✅ Revisa tu correo";

  }catch(e){
    msg.innerText = e.message;
  }
}
</script>

</body>
</html>
