<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuario</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#e5e7eb;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  border:1px solid rgba(255,255,255,0.1);
}

h2{
  margin:0;
  font-size:26px;
}

p{
  margin:5px 0;
  opacity:0.9;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  margin-right:10px;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

.des{
  background:#ef4444;
  color:white;
}

.del{
  background:#111827;
  color:white;
  border:1px solid #374151;
}

.app{
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h2 id="nombre">Cargando...</h2>
<p id="email"></p>
<p id="estado"></p>

<button class="des" id="desactivar">Desactivar</button>
<button class="del" id="eliminar">Eliminar</button>

<h3>Apps enviadas</h3>
<div id="apps"></div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  query,
  where,
  getDocs,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLZdhjEPY3iOuU6F6zlPwub38Qbzny2f8",
  authDomain: "dvmulti-831ba.firebaseapp.com",
  databaseURL: "https://dvmulti-831ba-default-rtdb.firebaseio.com",
  projectId: "dvmulti-831ba",
  storageBucket: "dvmulti-831ba.firebasestorage.app",
  messagingSenderId: "967026058841",
  appId: "1:967026058841:web:02b42def3c608d9abef348",
  measurementId: "G-PE1PLQF2H9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔐 VALIDAR ID (ARREGLA ERROR indexOf)
const params = new URLSearchParams(location.search);
const id = params.get("id");

if (!id) {
  alert("No se encontró el ID del usuario");
  location.href = "usuarios.php";
}

// USER
async function loadUser(){

  const ref = doc(db,"usuarios",id);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    alert("Usuario no existe");
    location.href = "usuarios.php";
    return;
  }

  const userData = snap.data();

  document.getElementById("nombre").innerText = userData.nombre || "-";
  document.getElementById("email").innerText = userData.email || "-";
  document.getElementById("estado").innerText = "Estado: " + (userData.estado || "Activo");
}

async function loadApps(){

  const q = query(collection(db,"apps"), where("uid","==",id));
  const snap = await getDocs(q);

  let html = "";

  snap.forEach(a=>{
    const d = a.data();

    html += `
      <div class="app">
        <b>${d.titulo || "-"}</b><br>
        ${d.categoria || "-"} · ${d.plataforma || "-"}<br>
        Estado: ${d.estado || "-"}
      </div>
    `;
  });

  document.getElementById("apps").innerHTML = html || "<p>No hay apps</p>";
}

loadUser();
loadApps();

// DESACTIVAR
document.getElementById("desactivar").onclick = async () => {

  await updateDoc(doc(db,"usuarios",id),{
    estado:"Desactivado"
  });

  alert("Cuenta desactivada");
  location.reload();
};

// ELIMINAR
document.getElementById("eliminar").onclick = async () => {

  if(!confirm("Eliminar usuario y TODAS sus apps?")) return;

  await deleteDoc(doc(db,"usuarios",id));

  const q = query(collection(db,"apps"), where("uid","==",id));
  const snap = await getDocs(q);

  snap.forEach(async (a)=>{
    await deleteDoc(doc(db,"apps",a.id));
  });

  alert("Usuario eliminado");
  location.href = "usuarios";
};

</script>

</body>
</html>
