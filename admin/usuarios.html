<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuarios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#e5e7eb;
}

.container{
  padding:30px;
  max-width:1100px;
  margin:auto;
}

h2{
  margin-bottom:15px;
  font-size:26px;
  font-weight:600;
}

/* TABLE DESKTOP */
table{
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  border:1px solid rgba(255,255,255,0.1);
}

th{
  background:rgba(0,0,0,0.4);
  padding:14px;
  text-align:left;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

td{
  padding:14px;
  font-size:14px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

tr:hover td{
  background:rgba(255,255,255,0.05);
}

/* BUTTON */
a.btn{
  padding:6px 12px;
  border-radius:10px;
  text-decoration:none;
  font-weight:600;
  font-size:13px;
  display:inline-block;
  transition:0.2s;
}

.ver{
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  color:white;
}

.ver:hover{
  transform:scale(1.05);
}

/* 📱 RESPONSIVE MOBILE */
@media (max-width: 768px){

  table, thead, tbody, th, td, tr{
    display:block;
    width:100%;
  }

  thead{
    display:none;
  }

  tr{
    margin-bottom:15px;
    border-radius:14px;
    overflow:hidden;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    padding:10px;
  }

  td{
    padding:10px;
    text-align:right;
    position:relative;
    border:none;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }

  td:last-child{
    border-bottom:none;
  }

  td::before{
    content:attr(data-label);
    position:absolute;
    left:10px;
    font-weight:600;
    color:#9ca3af;
    text-align:left;
  }

  a.btn{
    width:100%;
    text-align:center;
    margin-top:5px;
  }
}
</style>
</head>

<body>

<div class="container">

<h2>Usuarios</h2>

<table>
  <thead>
    <tr>
      <th>Usuario</th>
      <th>Email</th>
      <th>Apps</th>
      <th>Estado</th>
      <th>Acciones</th>
    </tr>
  </thead>

  <tbody id="list"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLZdhjEPY3iOuU6F6zlPwub38Qbzny2f8",
  authDomain: "dvmulti-831ba.firebaseapp.com",
  databaseURL: "https://dvmulti-831ba-default-rtdb.firebaseio.com",
  projectId: "dvmulti-831ba",
  storageBucket: "dvmulti-831ba.firebasestorage.app",
  messagingSenderId: "967026058841",
  appId: "1:967026058841:web:02b42def3c608d9abef348",
  measurementId: "G-PE1PLQF2H9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function load(){

  const users = await getDocs(collection(db,"usuarios"));

  let html = "";

  users.forEach(u=>{
    const d = u.data();

    html += `
      <tr>
        <td data-label="Usuario">${d.nombre || "-"}</td>
        <td data-label="Email">${d.email || "-"}</td>
        <td data-label="Apps">${d.totalApps || 0}</td>
        <td data-label="Estado">${d.estado || "Activo"}</td>
        <td data-label="Acciones">
          <a class="btn ver" href="ver_usuario.html?id=${u.id}">Ver</a>
        </td>
      </tr>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

load();
</script>

</body>
</html>
