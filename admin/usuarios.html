<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Usuarios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#f1f5f9;}

.container{padding:20px;max-width:1100px;margin:auto;}

table{
  width:100%;
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

th,td{
  padding:12px;
  text-align:left;
  font-size:14px;
  border-bottom:1px solid #eee;
}

th{background:#111827;color:white;}

a.btn{
  padding:6px 10px;
  border-radius:8px;
  text-decoration:none;
  font-weight:600;
}

.ver{background:#4f46e5;color:white;}
</style>
</head>

<body>

<div class="container">

<h2>Usuarios</h2>

<table>
  <thead>
    <tr>
      <th>Usuario</th>
      <th>Email</th>
      <th>Apps</th>
      <th>Estado</th>
      <th>Acciones</th>
    </tr>
  </thead>

  <tbody id="list"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyBLZdhjEPY3iOuU6F6zlPwub38Qbzny2f8",
    authDomain: "dvmulti-831ba.firebaseapp.com",
    databaseURL: "https://dvmulti-831ba-default-rtdb.firebaseio.com",
    projectId: "dvmulti-831ba",
    storageBucket: "dvmulti-831ba.firebasestorage.app",
    messagingSenderId: "967026058841",
    appId: "1:967026058841:web:02b42def3c608d9abef348",
    measurementId: "G-PE1PLQF2H9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function load(){

  const users = await getDocs(collection(db,"usuarios"));

  let html = "";

  users.forEach(u=>{
    const d = u.data();

    html += `
      <tr>
        <td>${d.nombre}</td>
        <td>${d.email}</td>
        <td>${d.totalApps || 0}</td>
        <td>${d.estado || "Activo"}</td>
        <td>
          <a class="btn ver" href="ver_usuario.php?id=${u.id}">Ver</a>
        </td>
      </tr>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

load();
</script>

</body>
</html>
