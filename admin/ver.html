<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalle App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:#e5e7eb;
}

.container{
  max-width:950px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:25px;
}

h1{
  margin:0 0 10px 0;
  font-size:24px;
}

.meta{
  font-size:14px;
  line-height:1.8;
  color:#cbd5e1;
}

.meta b{
  color:#fff;
}

hr{
  border:0;
  border-top:1px solid rgba(255,255,255,0.1);
  margin:10px 0;
}

/* BOTONES */
.btns{
  margin-top:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.aprobar{background:#22c55e;color:white;}
.rechazar{background:#ef4444;color:white;}
.eliminar{background:#111827;color:white;border:1px solid #374151;}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

a{
  color:#38bdf8;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1 id="titulo">Cargando...</h1>

<div class="meta" id="info"></div>

<div class="btns">
  <button class="aprobar" id="btnAprobar" disabled>Aprobar</button>
  <button class="rechazar" id="btnRechazar" disabled>Rechazar</button>
  <button class="eliminar" id="btnEliminar" disabled>Eliminar</button>
</div>

</div>

</div>

<!-- SOLO REEMPLAZA TU HTML INTERNO (info + render) -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  deleteDoc,
  addDoc,
  collection
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLZdhjEPY3iOuU6F6zlPwub38Qbzny2f8",
  authDomain: "dvmulti-831ba.firebaseapp.com",
  projectId: "dvmulti-831ba",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

let dataApp = null;

if(!id){
  document.getElementById("titulo").innerText = "ID no válido";
  throw new Error("No ID");
}

async function load(){

  const ref = doc(db,"apps",id);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    document.getElementById("titulo").innerText = "App no encontrada";
    return;
  }

  dataApp = snap.data();

  document.getElementById("titulo").innerText = dataApp.titulo ?? "Sin título";

  /* 🔥 ICONO + INFO */
  let html = `
    <div style="display:flex;gap:15px;align-items:center;flex-wrap:wrap;margin-bottom:15px;">
      ${dataApp.iconoBase64 ? `
        <img src="${dataApp.iconoBase64}" style="width:80px;height:80px;border-radius:16px;border:1px solid #333;">
      ` : ""}

      <div>
        <b>Usuario:</b> ${dataApp.nombre ?? "-"}<br>
        <b>Email:</b> ${dataApp.email ?? "-"}<br>
        <b>UID:</b> ${dataApp.uid ?? "-"}
      </div>
    </div>

    <hr>

    <b>Título:</b> ${dataApp.titulo ?? "-"}<br>
    <b>Descripción:</b> ${dataApp.descripcion ?? "-"}<br>
    <b>Detalle:</b> ${dataApp.detalle ?? "-"}<br>

    <hr>

    <b>Categoría:</b> ${dataApp.categoria ?? "-"}<br>
    <b>Plataforma:</b> ${dataApp.plataforma ?? "-"}<br>
    <b>Estado:</b> ${dataApp.estado ?? "-"}<br>

    <hr>

    <b>Versión:</b> ${dataApp.version ?? "-"}<br>
    <b>Tamaño:</b> ${dataApp.tamano ?? "-"}<br>

    <hr>

    <b>URL:</b> ${
      dataApp.url
        ? `<a href="${dataApp.url}" target="_blank">Abrir app</a>`
        : "-"
    }<br>

    <b>Telegram:</b> ${dataApp.telegram ?? "-"}<br>
    <b>WhatsApp:</b> ${dataApp.whatsapp ?? "-"}<br>
  `;

  /* 🔥 CAPTURAS */
  if(dataApp.capturasBase64 && dataApp.capturasBase64.length > 0){

    html += `<hr><b>Capturas:</b><br><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:10px;">`;

    dataApp.capturasBase64.forEach(img=>{
      html += `
        <img src="${img}"
        style="width:100%;border-radius:10px;border:1px solid #333;">
      `;
    });

    html += `</div>`;
  }

  document.getElementById("info").innerHTML = html;

  document.getElementById("btnAprobar").disabled = false;
  document.getElementById("btnRechazar").disabled = false;
  document.getElementById("btnEliminar").disabled = false;
}

load();

/* APROBAR */
document.getElementById("btnAprobar").onclick = async () => {

  await updateDoc(doc(db,"apps",id),{
    estado:"aprobada"
  });

  await addDoc(collection(db,"notificaciones"),{
    uid: dataApp.uid,
    titulo:"App aprobada 🎉",
    mensaje:"Tu app fue aprobada",
    tipo:"aprobada",
    url:dataApp.url
  });

  alert("Aprobada");
  location.reload();
};

/* RECHAZAR */
document.getElementById("btnRechazar").onclick = async () => {

  let motivo = prompt("Motivo del rechazo:");
  if(!motivo) return;

  await updateDoc(doc(db,"apps",id),{
    estado:"rechazada",
    motivo
  });

  await addDoc(collection(db,"notificaciones"),{
    uid: dataApp.uid,
    titulo:"App rechazada",
    mensaje:"Tu app fue rechazada",
    tipo:"rechazada",
    motivo
  });

  alert("Rechazada");
  location.reload();
};

/* ELIMINAR */
document.getElementById("btnEliminar").onclick = async () => {

  if(!confirm("Eliminar app?")) return;

  await deleteDoc(doc(db,"apps",id));

  alert("Eliminada");
  location.href="apps";
};
</script>

</body>
</html>
