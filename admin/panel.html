<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f1f5f9;
}

/* TOP */
.topbar{
  background:#111827;
  padding:12px 20px;
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.topbar a{
  color:white;
  text-decoration:none;
  font-size:14px;
  padding:6px 10px;
  border-radius:8px;
}

.topbar a:hover{
  background:rgba(255,255,255,0.1);
}

/* CONTAINER */
.container{
  padding:20px;
  max-width:1200px;
  margin:auto;
}

h1{margin:10px 0;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  margin:15px 0 25px;
}

.card{
  background:white;
  padding:18px;
  border-radius:12px;
  text-align:center;
}

.card h3{
  margin:5px 0;
  color:#4f46e5;
}

/* REQUEST */
.request{
  background:white;
  padding:18px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.meta{
  font-size:13px;
  color:#6b7280;
  margin-top:8px;
  line-height:1.5;
}

/* BUTTONS */
.btns{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btn{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.ok{background:#22c55e;color:white;}
.no{background:#ef4444;color:white;}

/* MODAL PRO */
#modalPub{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(6px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-box{
  background:linear-gradient(135deg,#1f2937,#111827);
  padding:22px;
  border-radius:16px;
  width:90%;
  max-width:400px;
  text-align:center;
  color:white;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.modal-box input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  outline:none;
}

.modal-box button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  margin-top:8px;
}

.publish{background:#22c55e;color:white;}
.cancel{background:#ef4444;color:white;}
</style>
</head>

<body>

<!-- MODAL -->
<div id="modalPub">
  <div class="modal-box">
    <h3>Publicar App</h3>

    <input id="appUrl" placeholder="URL de la app">

    <button class="publish" onclick="publicarFinal()">
      Publicar
    </button>

    <button class="cancel" onclick="cerrarModal()">
      Cancelar
    </button>
  </div>
</div>

<!-- TOP MENU -->
<div class="topbar">
  <a href="#"><i class="fa fa-chart-line"></i> Dashboard</a>
  <a href="apps"><i class="fa fa-mobile"></i> Apps</a>
  <a href="usuarios"><i class="fa fa-users"></i> Usuarios</a>
</div>

<div class="container">

  <h1>Dashboard</h1>

  <div class="grid">
    <div class="card"><h3 id="users">0</h3><p>Usuarios</p></div>
    <div class="card"><h3 id="apps">0</h3><p>Apps</p></div>
    <div class="card"><h3 id="pending">0</h3><p>Pendientes</p></div>
    <div class="card"><h3 id="rejected">0</h3><p>Rechazadas</p></div>
  </div>

  <h2 id="titlePending">Solicitudes Pendientes 0</h2>

  <div id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  updateDoc,
  doc,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLZdhjEPY3iOuU6F6zlPwub38Qbzny2f8",
  authDomain: "dvmulti-831ba.firebaseapp.com",
  databaseURL: "https://dvmulti-831ba-default-rtdb.firebaseio.com",
  projectId: "dvmulti-831ba",
  storageBucket: "dvmulti-831ba.firebasestorage.app",
  messagingSenderId: "967026058841",
  appId: "1:967026058841:web:02b42def3c608d9abef348"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let appIdActual = null;
let uidActual = null;

/* LOAD */
async function load(){

  const appsSnap = await getDocs(collection(db,"apps"));
  const usersSnap = await getDocs(collection(db,"usuarios")); // FIX IMPORTANTE

  let list = document.getElementById("list");

  let pending = 0;
  let apps = 0;
  let rejected = 0;

  list.innerHTML = "";

  appsSnap.forEach(d => {
    let a = d.data();

    if(a.estado === "aprobada") apps++;
    if(a.estado === "rechazada") rejected++;
    if(a.estado === "pendiente") pending++;

    if(a.estado !== "pendiente") return;

    list.innerHTML += `
      <div class="request">
        <h3>${a.titulo}</h3>

        <div class="meta">
          <b>${a.nombre || "Usuario"}</b><br>
          ${a.email || ""}<br>
          <b>Categoría:</b> ${a.categoria}<br>
          <b>Plataforma:</b> ${a.plataforma}<br>
        </div>

        <div class="btns">
          <button class="btn ok" onclick="abrirModal('${d.id}','${a.uid}')">Aprobar</button>
          <button class="btn no" onclick="rechazar('${d.id}','${a.uid}')">Rechazar</button>
        </div>
      </div>
    `;
  });

  document.getElementById("users").innerText = usersSnap.size;
  document.getElementById("apps").innerText = apps;
  document.getElementById("pending").innerText = pending;
  document.getElementById("rejected").innerText = rejected;

  document.getElementById("titlePending").innerText =
    "Solicitudes Pendientes " + pending;
}

load();

/* MODAL OPEN */
window.abrirModal = (id, uid) => {
  appIdActual = id;
  uidActual = uid;
  document.getElementById("modalPub").style.display = "flex";
};

/* CLOSE */
window.cerrarModal = () => {
  document.getElementById("modalPub").style.display = "none";
};

/* PUBLICAR */
window.publicarFinal = async () => {

  let url = document.getElementById("appUrl").value;

  if(!url){
    alert("Ingresa una URL");
    return;
  }

  await updateDoc(doc(db,"apps",appIdActual),{
    estado:"aprobada",
    url:url
  });

  await addDoc(collection(db,"notificaciones"),{
    uid: uidActual,
    tipo:"aprobada",
    url:url,
    titulo:"App aprobada 🎉",
    mensaje:"Tu app fue publicada correctamente"
  });

  cerrarModal();
  load();
};

/* RECHAZAR */
window.rechazar = async (id, uid) => {

  let motivo = prompt("Escribe el motivo del rechazo:");
  if(!motivo) return;

  await updateDoc(doc(db,"apps",id),{
    estado:"rechazada",
    motivo:motivo
  });

  await addDoc(collection(db,"notificaciones"),{
    uid,
    tipo:"rechazada",
    motivo
  });

  load();
};
</script>

</body>
</html>
