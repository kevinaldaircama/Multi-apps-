<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subir App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f1f5f9;
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background: linear-gradient(180deg,#7c3aed,#4f46e5);
  color:white;
  padding:20px;
}

.sidebar h2{text-align:center;}

.sidebar a{
  display:flex;
  align-items:center;
  gap:10px;
  color:white;
  text-decoration:none;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}

.sidebar a:hover{background:rgba(255,255,255,0.2);}

/* MAIN */
.main{flex:1;padding:20px;}

.header{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}

.input{margin-bottom:15px;}

.input label{
  font-size:13px;
  color:#6b7280;
}

.input input,
.input textarea,
.input select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:5px;
}

textarea{resize:none;}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* BOTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background: linear-gradient(135deg,#7c3aed,#a855f7);
  color:white;
  font-size:16px;
  cursor:pointer;
}

.help{
  font-size:12px;
  color:#6b7280;
  margin-top:-8px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:12px;
  text-align:center;
  width:300px;
}

.modal-box i{
  font-size:40px;
  color:#7c3aed;
  margin-bottom:10px;
}

/* RESPONSIVE */
@media(max-width:900px){
  body{flex-direction:column;}
  .sidebar{
    width:100%;
    display:flex;
    justify-content:space-around;
  }
  .sidebar h2{display:none;}
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Android App Store</h2>

  <a href="panel.html"><i class="fa-solid fa-house"></i> Inicio</a>
  <a href="subir.html"><i class="fa-solid fa-upload"></i> Subir App</a>
  <a href="perfil.html"><i class="fa-solid fa-user"></i> Mi Perfil</a>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h2>Subir App</h2>
  </div>

  <div class="card">

    <div class="input">
      <label>Título *</label>
      <input id="titulo" type="text">
    </div>

    <div class="input">
      <label>Descripción corta *</label>
      <input id="descripcion" type="text">
    </div>

    <div class="grid">

      <div class="input">
        <label>Categoría *</label>
        <select id="categoria">
          <option>Juegos</option>
          <option>Entretenimiento</option>
          <option>Educación</option>
          <option>Herramientas</option>
        </select>
      </div>

      <div class="input">
        <label>Plataforma *</label>
        <select id="plataforma">
          <option>Android</option>
          <option>iOS</option>
          <option>Web</option>
        </select>
      </div>

    </div>

    <div class="input">
      <label>URL de descarga *</label>
      <input id="url" type="text">
    </div>

    <div class="grid">

      <div class="input">
        <label>Versión *</label>
        <input id="version" type="text">
      </div>

      <div class="input">
        <label>Tamaño</label>
        <input id="tamano" type="text">
      </div>

    </div>

    <div class="input">
      <label>Descripción detallada</label>
      <textarea id="detalle" rows="4"></textarea>
    </div>

    <div class="input">
      <label>Telegram</label>
      <input id="telegram" type="text">
    </div>

    <div class="input">
      <label>WhatsApp</label>
      <input id="whatsapp" type="text">
    </div>

    <!-- ICONO -->
    <div class="input">
      <label>Icono de la app (512x512) *</label>
      <input id="icono" type="file" accept="image/*">
    </div>

    <!-- CAPTURAS -->
    <div class="input">
      <label>Capturas de pantalla (mínimo 3) *</label>
      <input id="capturas" type="file" accept="image/*" multiple>
    </div>

    <p class="help">
      ✔ Campos con * son obligatorios<br>
      ✔ Icono 512x512 obligatorio<br>
      ✔ Mínimo 3 capturas de pantalla
    </p>

  </div>

  <button onclick="subirApp()">Enviar App para Revisión</button>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <i class="fa-solid fa-circle-check"></i>
    <h3>Tu app fue enviada</h3>
    <p>Está en revisión</p>
    <button onclick="cerrarModal()">OK</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLZdhjEPY3iOuU6F6zlPwub38Qbzny2f8",
  authDomain: "dvmulti-831ba.firebaseapp.com",
  projectId: "dvmulti-831ba",
  storageBucket: "dvmulti-831ba.firebasestorage.app",
  messagingSenderId: "967026058841",
  appId: "1:967026058841:web:02b42def3c608d9abef348"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 🔥 CONVERTIR A BASE64 */
function toBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

/* 🔥 VALIDAR ICONO 512x512 */
function validarImagen(file){
  return new Promise((resolve)=>{
    const img = new Image();
    img.src = URL.createObjectURL(file);

    img.onload = () => {
      const ok = img.width === 512 && img.height === 512;
      resolve(ok);
    };
  });
}

/* 🔥 SUBIR APP */
window.subirApp = async function(){

  const user = auth.currentUser;

  if(!user){
    alert("Debes iniciar sesión");
    return;
  }

  const titulo = document.getElementById("titulo").value.trim();
  const descripcion = document.getElementById("descripcion").value.trim();
  const categoria = document.getElementById("categoria").value;
  const plataforma = document.getElementById("plataforma").value;
  const url = document.getElementById("url").value.trim();
  const version = document.getElementById("version").value.trim();

  const icono = document.getElementById("icono").files[0];
  const capturas = document.getElementById("capturas").files;

  /* VALIDACIONES */
  if(!titulo || !descripcion || !url || !version){
    alert("Completa los campos obligatorios (*)");
    return;
  }

  if(!icono){
    alert("El icono es obligatorio");
    return;
  }

  const iconoOk = await validarImagen(icono);
  if(!iconoOk){
    alert("El icono debe ser 512x512");
    return;
  }

  if(capturas.length < 3){
    alert("Debes subir mínimo 3 capturas");
    return;
  }

  /* CONVERTIR ICONO */
  const iconoBase64 = await toBase64(icono);

  /* CONVERTIR CAPTURAS */
  let capturasBase64 = [];

  for(let i=0;i<capturas.length;i++){
    if(i >= 3) break; // solo 3
    const base64 = await toBase64(capturas[i]);
    capturasBase64.push(base64);
  }

  /* GUARDAR EN FIRESTORE */
  await addDoc(collection(db,"apps"),{
    uid:user.uid,
    titulo,
    descripcion,
    categoria,
    plataforma,
    url,
    version,
    tamano:document.getElementById("tamano").value,
    detalle:document.getElementById("detalle").value,
    telegram:document.getElementById("telegram").value,
    whatsapp:document.getElementById("whatsapp").value,
    estado:"pendiente",
    fecha:serverTimestamp(),

    iconoBase64,
    capturasBase64
  });

  /* LIMPIAR */
  document.querySelectorAll("input,textarea").forEach(i=>{
    if(i.type !== "file") i.value="";
  });

  document.getElementById("icono").value="";
  document.getElementById("capturas").value="";

  document.getElementById("modal").style.display="flex";
};

window.cerrarModal = function(){
  document.getElementById("modal").style.display="none";
  window.location="home";
};
</script>

</body>
</html>
